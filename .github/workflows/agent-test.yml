name: Agent - Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test agent
        run: node agents/test/index.js

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-agent-report
          path: agents/test/output/test-report.json
          if-no-files-found: warn
